services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - db

  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: gamedar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

volumes:
  postgres_data: