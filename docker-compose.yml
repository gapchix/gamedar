services:
  app:
    build: .
    ports:
      - "127.0.0.1:3001:3000"
    env_file: .env
    depends_on:
      - db
    restart: unless-stopped
    profiles:
      - prod

  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamedar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    restart: unless-stopped
    profiles:
      - prod

  db-dev:
    image: postgres:17
    ports:
      - "5532:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamedar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    profiles:
      - dev

volumes:
  postgres_data:
